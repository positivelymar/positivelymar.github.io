<body>
  <body>
    <div class="container">
        <header class="page-header">
           <section class="text-header">
            <h1>Food Safety First! Does your fav spot pass the check?</h1>
            <h2> Check if a Maryland restaurants is in compliance with food inspections. Filter by city, zip code or see historical data here! </h2>
            </section> 
            <img class="photo-header" src="fried-rice.png" alt="Illustration of fried rice">
        </header>
     <!-- <p><strong>Assignment:</strong> This assignment asks you to use the same data Model to power four different Views through four different Controllers. Each presentation emphasizes different aspects of the information to serve different user goals.</p> -->

        <nav class="view-selector">
            <button class="view-button" id="btn-categories" data-view="categories"> 
                <div class="button-content">
                    <span class="material-symbols-rounded">asterisk</span>
                    <h3>View by Category</h3>
                </div>
            </button>
            <button class="view-button" id="btn-table" data-view="table">
                <div class="button-content">
                    <span class="material-symbols-rounded">panorama_horizontal</span>
                    <h3>Full Restaurant List<Table></Table></h3>
                </div>
            </button>
            <button class="view-button" id="btn-stats" data-view="stats">
                <div class="button-content">
                    <span class="material-symbols-rounded">emergency</span>
                    <h3>Stats by City or Zip</h3>
                </div>
            </button>
            <button class="view-button" id="btn-external" data-view="stats">
                <div class="button-content">
                    <span class="material-symbols-rounded">looks</span>
                    <h3>View Restaurant Map</h3>
                </div>
            </button>
        </nav>

        <main class="display-container">
            <div id="data-display">
                <div class="loading">Loading restaurant data...</div>
            </div>
        </main>
